name: Build unstable release

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  

permissions:
  contents: read

jobs:
  build-unstable-release:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: dev

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Build with Gradle
      uses: gradle/gradle-build-action@67421db6bd0bf253fb4bd25b31ebb98943c375e1
      with:
        arguments: korurg-chat:build

    - name: Zip release
      run: |
        zip -7 ./korurg-chat-unstable.zip ./templates
        zip -j -7 ./korurg-chat-unstable.zip ./korurg-chat/build/libs/korurg-chat.jar
      shell: bash

    - name: Create a Release
      run: |
        hub release delete "unstable"
        hub release create -a "./korurg-chat-unstable.zip" -m "Unstable release" -m "Release date: $(date)" "unstable"
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}